<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>תשלום מאובטח · From Zero to Infinite</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
@media(max-width:640px){
  .payment-iframe{height:600px !important}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="page">

<!-- ── LOGO ── -->
<section style="padding:56px 24px 0;text-align:center">
  <a href="/">
    <img src="../brand_assets/logo.png" alt="From Zero to Infinite"
         style="width:clamp(140px,16vw,260px);margin:0 auto;filter:drop-shadow(0 0 30px rgba(200,222,255,0.07));display:block"/>
  </a>
</section>

<!-- ── PAYMENT SECTION ── -->
<section style="padding:48px 24px 80px">
  <div class="wrap">

    <!-- Section label -->
    <p class="section-label reveal">&gt; SECURE_CHECKOUT</p>
    <div class="circuitry-line reveal" style="margin-bottom:40px"></div>

    <!-- Heading -->
    <h1 class="font-heading reveal" style="font-size:clamp(14px,2.5vw,18px);color:rgba(240,240,255,0.92);letter-spacing:0.18em;text-align:center;margin-bottom:32px">
      שלב אחרון: הסדרת תשלום מאובטח
    </h1>

    <!-- Payment card -->
    <div class="glass border-neon glow-neon reveal" style="padding:0;overflow:hidden">
      <iframe
        src="https://pages.greeninvoice.co.il/payments/links/82cadc22-897d-4fc3-9400-6dbfbf16270e"
        width="100%"
        height="750px"
        frameborder="0"
        class="payment-iframe"
        style="border-radius:12px;background:#fff;display:block;min-height:600px"
        title="סליקה מאובטחת"
        allow="payment"
      ></iframe>
    </div>

    <!-- Footer note -->
    <div class="reveal" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           style="color:var(--muted);flex-shrink:0">
        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <p style="font-size:12px;color:var(--muted);letter-spacing:0.06em" dir="rtl">
        סליקה מאובטחת ע״י מורנינג מבית Grow
      </p>
    </div>

  </div>
</section>

<!-- ── FOOTER ── -->
<footer>
  <p class="font-heading" style="font-size:10px;color:var(--muted);letter-spacing:0.15em">© FROM ZERO TO INFINITE — LIHI ZIV</p>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:4px">
    <a href="/terms" style="font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:0.08em;transition:color .2s"
       onmouseover="this.style.color='hsl(210,100%,65%)'" onmouseout="this.style.color='var(--muted)'">מדיניות ביטולים ותקנון</a>
    <p style="font-size:11px;color:var(--muted);letter-spacing:0.05em;text-align:center" dir="rtl">From Zero to Infinite | ליהי זיו בן שימול | עמישב תל אביב-יפו, ישראל</p>
  </div>
</footer>

</div><!-- /.page -->

<script>
(function(){
  const canvas=document.getElementById('bg-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,nodes=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',()=>{resize();init();});
  function Node(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=(Math.random()-.5)*.3;this.vy=(Math.random()-.5)*.3;
    this.r=Math.random()*1.5+.5;this.opacity=Math.random()*.5+.2;
  }
  function init(){nodes=[];const c=Math.floor((W*H)/18000);for(let i=0;i<c;i++)nodes.push(new Node());}
  init();
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<160){ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.strokeStyle=`rgba(77,184,255,${(1-d/160)*.15})`;ctx.lineWidth=.5;ctx.stroke();}
      }
    }
    nodes.forEach(n=>{
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(77,184,255,${n.opacity})`;ctx.fill();
      n.x+=n.vx;n.y+=n.vy;
      if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');});
},{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>

</body>
</html>
